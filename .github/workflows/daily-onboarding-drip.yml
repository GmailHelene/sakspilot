name: Daily Onboarding Drip

# Kjører hver morgen 08:00 UTC (= 09:00 Oslo vinter / 10:00 Oslo sommer).
# Sender drip-eposter dag 3, 7 og 14 til brukere som passerte de
# milepælene siden registrering. Dag 0 (velkomst) sendes direkte fra
# /auth/register-handleren.
# Kan også kjøres manuelt fra Actions-tab via "Run workflow"-knappen.
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install fra workspace-root så workspaces oppløses riktig
      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Run onboarding drip
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: npm run job:onboarding-drip
