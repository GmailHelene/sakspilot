name: Daily Automation Trigger

# Kjører hver natt 00:00 UTC (= 01:00 Oslo vinter / 02:00 Oslo sommer).
# Scanner alle milepæler med dueDate nær og trigger relevante automations.
# Kan også kjøres manuelt fra Actions-tab via "Run workflow"-knappen.
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Bare apps/api + packages/db trengs — install fra workspace-root så
      # workspaces oppløses riktig
      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Run daily automation trigger
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm run job:daily-automations
