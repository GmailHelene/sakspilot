name: Release Desktop (.exe)

on:
  push:
    tags:
      - 'desktop-v*'   # f.eks. git tag desktop-v0.1.0 && git push --tags
  workflow_dispatch:    # manuell trigger fra GitHub Actions UI

jobs:
  build:
    name: Build Sakspilot.exe
    runs-on: windows-latest    # MÅ være Windows pga get-windows native module
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps
        run: npm ci --workspaces --include-workspace-root

      - name: Install desktop deps (få native modules)
        working-directory: apps/desktop
        run: npm install --no-audit --no-fund

      - name: Build .exe
        working-directory: apps/desktop
        run: npm run build:exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sakspilot-desktop-${{ github.ref_name }}
          path: |
            apps/desktop/release/Sakspilot-*-win-x64.zip
            apps/desktop/release/Sakspilot-win32-x64/
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          name: Sakspilot Desktop ${{ github.ref_name }}
          files: apps/desktop/release/Sakspilot-*-win-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
