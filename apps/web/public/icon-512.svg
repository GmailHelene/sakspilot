<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: navy rounded square -->
  <rect width="512" height="512" rx="112" fill="#1E3A5F"/>

  <!-- Soft inner ring for depth -->
  <rect x="32" y="32" width="448" height="448" rx="84"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Workspace cards stacked at bottom (kanban-hint) -->
  <g opacity="0.22">
    <rect x="116" y="378" width="280" height="18" rx="9" fill="#FFFFFF"/>
    <rect x="116" y="406" width="232" height="18" rx="9" fill="#FFFFFF"/>
    <rect x="116" y="434" width="168" height="18" rx="9" fill="#FFFFFF"/>
  </g>

  <!-- Pilot triangle: gold with crisp white outline -->
  <path d="M256 84 L394 332 L118 332 Z"
        fill="#D4A017"
        stroke="#FFFFFF"
        stroke-width="8"
        stroke-linejoin="round"/>

  <!-- Compass needle inside triangle: diamond shape -->
  <path d="M256 142 L238 272 L256 260 L274 272 Z" fill="#FFFFFF"/>

  <!-- Tip dot for compass needle -->
  <circle cx="256" cy="132" r="10" fill="#FFFFFF"/>
</svg>
