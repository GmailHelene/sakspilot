<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Charcoal rounded square — nøytral, profesjonell -->
  <rect width="512" height="512" rx="112" fill="#1F1F1F"/>

  <!-- Subtil indre lys-ring for depth -->
  <rect x="32" y="32" width="448" height="448" rx="84"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Bold "S" formet som to sammenhengende Bezier-kurver,
       fill ingen + tykk hvit stroke = clean geometrisk look -->
  <path d="M 366 178
           C 366 132, 322 122, 256 122
           C 190 122, 146 132, 146 198
           C 146 256, 190 268, 256 268
           C 322 268, 366 280, 366 336
           C 366 402, 322 412, 256 412
           C 190 412, 146 402, 146 354"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="60"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
